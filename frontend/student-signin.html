<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Student Sign In - CampusResolve</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col"
  >
    <div
      class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden"
    >
      <div class="layout-container flex h-full grow flex-col">
        <!-- Navigation -->
        <header
          class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-20 lg:px-40 py-4 bg-white dark:bg-slate-900/50 backdrop-blur-md sticky top-0 z-50"
        >
          <div class="flex items-center gap-3 text-primary">
            <div
              class="size-8 flex items-center justify-center bg-primary/10 rounded-lg"
            >
              <span class="material-symbols-outlined text-primary"
                >campaign</span
              >
            </div>
            <h2
              class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight"
            >
              CampusResolve
            </h2>
          </div>
        </header>
        <!-- Main Content Area -->
        <main
          class="flex-1 flex items-center justify-center p-6 bg-gradient-to-br from-primary/5 via-transparent to-primary/5"
        >
          <div class="w-full max-w-md">
            <!-- Login Card -->
            <div
              class="bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden"
            >
              <!-- Header Image/Pattern -->
              <div class="h-32 bg-primary relative overflow-hidden">
                <div
                  class="absolute inset-0 opacity-20"
                  data-alt="University campus library study area blurred background"
                  style="
                    background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuAAm3Epnm3WOiNORdnK7-tYq8B04H-647klUhJHXH0POdM70pTLLmZ63GrqbIUUFl54aT_AHU9ijmoku4z8Nb17lrljVk-0tE1i0GQhc4KJHrEzdUpaY2GLifmfdKneQ0JXu28LMmjbdOovsyV9WhHsW5WQk5Jgu-lJDujgBpNPYfj9uX9ASZBf4VbroGkjuXneK6FthkB0H_Bf4pI3XsamCKWAg-0RFfchyIBpjAeT3-ZnOIs1TjdlnUiBv_gdjnivxA9liJ9CLMs&quot;);
                    background-size: cover;
                    background-position: center;
                  "
                ></div>
                <div
                  class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"
                ></div>
                <div class="absolute bottom-4 left-6">
                  <h1 class="text-white text-2xl font-bold">Student Portal</h1>
                  <p class="text-white/80 text-sm">
                    Welcome back to CampusResolve
                  </p>
                </div>
              </div>
              <!-- Form Content -->
              <div class="p-8">
                <div class="mb-8">
                  <h3 class="text-slate-900 dark:text-white text-lg font-bold">
                    Login to Your Account
                  </h3>
                  <p class="text-slate-500 dark:text-slate-400 text-sm">
                    Submit and track your complaints securely.
                  </p>
                </div>
                <form class="space-y-5">
                  <!-- ID Field -->
                  <div class="space-y-2">
                    <label
                      class="text-sm font-semibold text-slate-700 dark:text-slate-300 block"
                      >Student ID or Email</label
                    >
                    <div class="relative">
                      <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl"
                        >person</span
                      >
                      <input
                        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg py-3 pl-10 pr-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                        placeholder="e.g. 2023STU001 or name@uni.edu"
                        type="text"
                      />
                    </div>
                  </div>
                  <!-- Password Field -->
                  <div class="space-y-2">
                    <div class="flex justify-between items-center">
                      <label
                        class="text-sm font-semibold text-slate-700 dark:text-slate-300"
                        >Password</label
                      >
                      <a
                        class="text-xs font-medium text-primary hover:underline"
                        href="#"
                        >Forgot Password?</a
                      >
                    </div>
                    <div class="relative">
                      <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl"
                        >lock</span
                      >
                      <input
                        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg py-3 pl-10 pr-12 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                        placeholder="••••••••"
                        type="password"
                      />
                      <button
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors"
                        type="button"
                      >
                        <span class="material-symbols-outlined text-xl"
                          >visibility</span
                        >
                      </button>
                    </div>
                  </div>
                  <!-- Options -->
                  <div class="flex items-center gap-2">
                    <input
                      class="w-4 h-4 rounded text-primary border-slate-300 focus:ring-primary cursor-pointer"
                      id="remember"
                      type="checkbox"
                    />
                    <label
                      class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer"
                      for="remember"
                      >Remember me for 30 days</label
                    >
                  </div>
                  <!-- CTA Button -->
                  <button
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group"
                    type="submit"
                  >
                    <span>Sign In to Portal</span>
                    <span
                      class="material-symbols-outlined group-hover:translate-x-1 transition-transform"
                      >arrow_forward</span
                    >
                  </button>
                </form>
                <!-- Footer Links -->
                <div class="mt-8 text-center">
                  <p class="text-slate-500 dark:text-slate-400 text-sm">
                    Don't have an account?
                    <a
                      class="text-primary font-semibold hover:underline"
                      href="student-signup.html"
                      >Sign up</a
                    >
                  </p>
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- Footer Section -->
        <footer
          class="py-6 px-6 md:px-20 lg:px-40 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50"
        >
          <div
            class="flex flex-col md:flex-row justify-between items-center gap-4"
          >
            <p class="text-slate-500 text-sm">
              © 2026 CampusResolve. All rights reserved.
            </p>
          </div>
        </footer>
      </div>
    </div>
  </body>
</html>
